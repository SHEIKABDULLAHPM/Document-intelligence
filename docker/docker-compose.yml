services:
  document-intelligence:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: document-intelligence-app
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - TESSERACT_PATH=/usr/bin/tesseract
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      - HF_HOME=/app/cache/huggingface
      - TRANSFORMERS_CACHE=/app/cache/transformers
    volumes:
      # Persistent cache for models
      - model_cache:/app/cache
      # Persistent data storage
      - data_storage:/app/data
      # Logs
      - logs_storage:/app/logs
    restart: unless-stopped
    networks:
      - app-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  model_cache:
    driver: local
  data_storage:
    driver: local
  logs_storage:
    driver: local

networks:
  app-network:
    driver: bridge